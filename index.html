<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backpack</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="images/app-icon.png">
</head>
<body>
  <header>
    <nav>
      <a href="/" class="logo">
        <img src="images/app-icon.png" alt="Backpack icon">
        Backpack
      </a>
      <div class="nav-links">
        <a href="/privacy">Privacy Policy</a>
        <a href="/terms">Terms of Service</a>
        <a href="/support">Support</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero">
      <img src="images/app-icon.png" alt="Backpack" class="hero-icon">
      <h1>Backpack</h1>
      <p class="tagline">Your documents, automatically organised.<br>No accounts. No cloud. No tracking.</p>

      <div class="hero-features">
        <span class="feature-pill">On-Device AI</span>
        <span class="feature-pill">Privacy-First</span>
        <span class="feature-pill">Email Scanning</span>
      </div>

      <div class="app-store-badges">
        <!-- Replace # with your App Store link -->
        <a href="#" class="app-store-btn">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          Download on the App Store
        </a>
      </div>
    </section>

    <section class="screenshots">
      <div class="screenshots-track">
        <img src="images/bg-ob-1.png" alt="Your documents are everywhere" class="screenshot">
        <img src="images/bp-ob-2.png" alt="Just add your documents" class="screenshot">
        <img src="images/bp-ob-3.png" alt="Your documents never leave your device" class="screenshot">
        <img src="images/bp-ob-4.png" alt="Powered by Apple Intelligence" class="screenshot">
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-links">
      <a href="/privacy">Privacy Policy</a>
      <a href="/terms">Terms of Service</a>
      <a href="/support">Support</a>
    </div>
    <p class="copyright">&copy; 2026 Backpack. All rights reserved.</p>
  </footer>
</body>
</html>
